<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot BTS BioALC</title>
<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  font-family:Arial, Helvetica, sans-serif;
  background:#f5f5f5;
  overflow-x:hidden;
}

.chat-container {
  width:100%;
  height:100%;
}

iframe {
  width:100%;
  height:100%;
  border:none;
}

/* Étiquette au-dessus */
.popup-label {
  position: fixed;
  top: calc(50% - 190px); /* légèrement au-dessus du popup */
  left:50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.7);
  color:white;
  padding:6px 12px;
  border-radius:12px;
  font-size:14px;
  z-index:10000;
  pointer-events:none;
}

/* Popup rond clignotant */
.popup {
  position: fixed;
  top:50%;
  left:50%;
  transform: translate(-50%, -50%);
  width:300px;
  height:300px;
  max-width:75%;
  max-height:75%;
  background:#c62828;
  color:white;
  border-radius:50%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  z-index:9999;
  box-shadow:0 12px 30px rgba(0,0,0,0.4);
  animation: pulse 1s ease-in-out infinite;
  padding:20px;
}

.popup img {
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:15px;
}

@keyframes pulse {
  0%,100%{ transform:translate(-50%,-50%) scale(1); opacity:1; }
  50%{ transform:translate(-50%,-50%) scale(1.05); opacity:0.9; }
}

.bubble, .icon {
  position: fixed;
  z-index:9998;
  pointer-events:none;
  opacity:0.8;
}
</style>
</head>
<body>

<div class="chat-container">
  <iframe src="https://chatmd.forge.apps.education.fr//#https://codimd.apps.education.fr/s/0wMcu4T8P" id="chatbot"></iframe>
</div>

<!-- Étiquette -->
<div class="popup-label" id="popupLabel">Popup de 5 secondes</div>

<!-- Popup rond -->
<div class="popup" id="popup">
  <img src="https://www.lycee-valin.fr/RJVALIN/wp-content/uploads/2026/03/image-3.png" alt="Chatbot">
  Nouvel outil pour découvrir le BTS Bioanalyses en Laboratoire de Contrôle
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
  const popup = document.getElementById("popup");
  const label = document.getElementById("popupLabel");

  // Disparition automatique après 5s
  setTimeout(()=> {
    popup.remove();
    label.remove();
  }, 5000);

  const colors = ["#ff1744","#f50057","#ff9100","#00e676","#2979ff"];
  const icons = ["🧬","⚗️","🧪","🔬"];
  const particleCount = 20;

  for(let i=0;i<particleCount;i++){
    const elem = document.createElement("div");
    if(Math.random()<0.3){
      elem.className="icon";
      elem.textContent=icons[Math.floor(Math.random()*icons.length)];
      elem.style.fontSize=`${14+Math.random()*16}px`;
    }else{
      elem.className="bubble";
      const size=8+Math.random()*15;
      elem.style.width=size+"px";
      elem.style.height=size+"px";
      elem.style.background=colors[Math.floor(Math.random()*colors.length)];
      elem.style.borderRadius="50%";
    }

    const angle=Math.random()*2*Math.PI;
    const radius=160+Math.random()*80;
    elem.style.left=`calc(50% + ${Math.cos(angle)*radius}px)`;
    elem.style.top=`calc(50% + ${Math.sin(angle)*radius}px)`;
    document.body.appendChild(elem);

    const duration=3000+Math.random()*2000;
    elem.animate([
      { transform:"translateY(0) scale(1)", opacity:1 },
      { transform:`translateY(-${20+Math.random()*50}px) scale(0.5)`, opacity:0 }
    ],{duration:duration, iterations:1, easing:"ease-out"});

    setTimeout(()=> elem.remove(), duration);
  }
});
</script>

</body>
</html>
