<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot BTS BioALC</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Arial, Helvetica, sans-serif;
    background: #f5f5f5;
    overflow-x: hidden;
  }
  .chat-container {
    width: 100%;
    height: 100%;
  }
  iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* ---------- Popup festif ---------- */
  .popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 75%;
    max-width: 600px;
    background: #c62828;
    color: white;
    padding: 24px 30px;
    border-radius: 16px;
    font-size: 20px;
    font-weight: bold;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
    z-index: 9999;
    box-shadow: 0 12px 30px rgba(0,0,0,0.4);
    text-align: center;
    animation: popupEntrance 0.5s ease-out;
  }

  .popup img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    object-fit: cover;
  }

  .popup-text {
    font-size: 18px;
  }

  /* Bulles festives */
  .bubble {
    position: fixed;
    border-radius: 50%;
    opacity: 0.8;
    z-index: 9998;
    pointer-events: none;
  }

  @keyframes popupEntrance {
    0% { transform: translate(-50%, -60%) scale(0.5); opacity: 0; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<div class="chat-container">
  <iframe src="https://chatmd.forge.apps.education.fr//#https://codimd.apps.education.fr/s/0wMcu4T8P" id="chatbot"></iframe>
</div>

<!-- Popup festif -->
<div class="popup" id="popup">
  <img src="https://www.lycee-valin.fr/RJVALIN/wp-content/uploads/2026/03/image-3.png" alt="Chatbot">
  <div class="popup-text">
    Nouvel outil pour découvrir le BTS Bioanalyses en Laboratoire de Contrôle
  </div>
</div>

<script>
// ---------- Gestion du popup ----------
document.addEventListener("DOMContentLoaded", function() {
  const popup = document.getElementById("popup");

  // Disparition automatique après 5s
  setTimeout(() => {
    popup.remove();
  }, 5000);

  // ---------- Bulles festives ----------
  const colors = ["#ff1744","#f50057","#ff9100","#00e676","#2979ff"];
  const bubbleCount = 20;

  for (let i=0; i<bubbleCount; i++) {
    const b = document.createElement("div");
    b.className = "bubble";
    const size = Math.random()*20 + 10; // 10-30px
    b.style.width = size + "px";
    b.style.height = size + "px";
    b.style.background = colors[Math.floor(Math.random()*colors.length)];

    // Position autour du popup (périphérie)
    const angle = Math.random() * 2 * Math.PI;
    const radius = 150 + Math.random()*50; // distance depuis centre
    b.style.left = `calc(50% + ${Math.cos(angle)*radius}px)`;
    b.style.top = `calc(50% + ${Math.sin(angle)*radius}px)`;
    document.body.appendChild(b);

    // Animation montée et disparition
    const duration = 3000 + Math.random()*2000;
    b.animate([
      { transform: "translateY(0) scale(1)", opacity: 1 },
      { transform: `translateY(-${50 + Math.random()*50}px) scale(0.5)`, opacity: 0 }
    ], { duration: duration, iterations: 1, easing: "ease-out" });

    setTimeout(() => b.remove(), duration);
  }
});
</script>

</body>
</html>
