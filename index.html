<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot BTS BioALC</title>
<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  font-family:Arial, Helvetica, sans-serif;
  background:#f5f5f5;
  overflow:hidden; /* plus de double ascenseur */
}

.chat-wrapper {
  position:relative;
  width:100%;
  height:100%;
}

/* iframe chatbot */
.chat-wrapper iframe {
  width:100%;
  height:100%;
  border:none;
}

/* popup existante */
.popup {
  position: fixed;
  top:50%;
  left:50%;
  transform: translate(-50%, -50%);
  background:#c62828;
  color:white;
  border-radius:50%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  z-index:9999;
  box-shadow:0 12px 30px rgba(0,0,0,0.4);
  padding:15px;
}
.popup img { width:140px; height:140px; border-radius:50%; }

/* badge compteur intégré (au-dessus du bouton envoyer) */
#visitorBadge {
  position:absolute;
  bottom:80px; /* ajustable selon le bouton */
  right:20px;  /* ajustable */
  background:rgba(255,255,255,0.9);
  padding:4px 8px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.25);
  z-index:9999;
}
#visitorBadge img {
  height:18px;
}
</style>
</head>

<body>

<div class="chat-wrapper">
  <!-- iframe du chatbot -->
  <iframe src="https://chatmd.forge.apps.education.fr//#https://codimd.apps.education.fr/s/0wMcu4T8P"></iframe>

  <!-- compteur intégré au chat -->
  <div id="visitorBadge">
    <img src="https://visitor-badge.laobi.icu/badge?page_id=wilfrid-grossin.chatbot-BTSBioALC&left_text=&right_text=" alt="visites">
  </div>

  <!-- popup (existant) -->
  <div class="popup">
    <img src="https://www.lycee-valin.fr/RJVALIN/wp-content/uploads/2026/03/image-3.png" alt="Chatbot">
    <div class="popup-text">Nouvel outil pour découvrir le BTS Bioanalyses en Laboratoire de Contrôle</div>
  </div>
</div>

</body>
</html>
